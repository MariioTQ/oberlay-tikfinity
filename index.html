<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== OVERLAY NOCTURNO ===== */
#nightOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  pointer-events: none;
  z-index: 999;
}

/* ===== ZONA SUPERIOR FIJA ===== */
#topBar {
  display: flex;
  width: 100%;
  height: 150px;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.55) 0%,
    rgba(0, 0, 0, 0.35) 80%,
    rgba(0, 0, 0, 0) 100%
  );
}

/* ACTIVITY IZQUIERDA */
#giftsBox {
  flex: 1;
  height: 100%;
  overflow: hidden;
  position: relative;
}

#giftsBox iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% / 1.2);
  height: calc(100% / 1.2);
  border: none;
  transform: scale(1.2);
  transform-origin: top left;
}

/* VIEWERS DERECHA */
#viewersBox {
  width: 200px;
  height: 100%;
  flex-shrink: 0;
}

#viewersBox iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== SEPARADOR ===== */
#separator {
  width: 100%;
  height: 3px;
  flex-shrink: 0;
  background: linear-gradient(
    to right,
    transparent 0%,
    rgba(255, 60, 80, 0.7) 20%,
    rgba(255, 60, 80, 0.95) 50%,
    rgba(255, 60, 80, 0.7) 80%,
    transparent 100%
  );
  box-shadow: 0 0 8px rgba(255, 60, 80, 0.5);
}

/* ===== CHAT DINÁMICO ===== */
#chatContainer {
  flex: 1;
  width: 100%;
  overflow: hidden;
  position: relative;
}

#chatFrame {
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% / 2);
  height: calc(100% / 2);
  border: none;
  transform: scale(2);
  transform-origin: top left;
}

/* ===== BADGE MODO NOCHE ===== */
#nightBadge {
  display: none;
  position: fixed;
  bottom: 8px;
  right: 8px;
  background: rgba(0, 0, 0, 0.6);
  color: rgba(255, 200, 60, 0.95);
  font-size: 11px;
  font-family: monospace;
  padding: 3px 8px;
  border-radius: 10px;
  z-index: 1000;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="nightOverlay"></div>
<div id="nightBadge">🌙 modo noche</div>

<div id="topBar">
  <div id="giftsBox">
    <iframe src="https://tikfinity.zerody.one/widget/gifts?cid=2833538"></iframe>
  </div>
  <div id="viewersBox">
    <iframe src="https://tikfinity.zerody.one/widget/viewercount?cid=2833538"></iframe>
  </div>
</div>

<div id="separator"></div>

<div id="chatContainer">
  <iframe 
    id="chatFrame"
    src="https://tikfinity.zerody.one/widget/chat?cid=2833538">
  </iframe>
</div>

<script>
  // Modo nocturno automático — activo entre 8pm y 6am
  function checkNightMode() {
    const hora = new Date().getHours();
    const esNoche = hora >= 20 || hora < 6;
    document.getElementById('nightOverlay').style.display = esNoche ? 'block' : 'none';
    document.getElementById('nightBadge').style.display   = esNoche ? 'block' : 'none';
  }

  checkNightMode();
  setInterval(checkNightMode, 5 * 60 * 1000); // revisa cada 5 minutos
</script>

</body>
</html>
