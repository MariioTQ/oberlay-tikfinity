<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== ZONA SUPERIOR FIJA ===== */
#topBar {
  display: flex;
  width: 100%;
  height: 120px;
  flex-shrink: 0;
}

/* ACTIVITY IZQUIERDA */
#giftsBox {
  flex: 1;
  height: 100%;
}

#giftsBox iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* VIEWERS DERECHA */
#viewersBox {
  width: 200px;
  height: 100%;
}

#viewersBox iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== CHAT DINÁMICO ===== */
#chatContainer {
  flex: 1;
  width: 100%;
  overflow: hidden;
  position: relative;
}

#chatFrame {
  /* Con zoom 2.5x el iframe ocupa más espacio del que tiene,
     así que lo escalamos desde arriba-izquierda */
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% / 2.5);   /* ancho real = contenedor / zoom */
  height: calc(100% / 2.5);  /* alto real  = contenedor / zoom */
  border: none;
  transform: scale(2.5);
  transform-origin: top left;
}
</style>
</head>

<body>

<div id="topBar">

  <div id="giftsBox">
    <iframe src="https://tikfinity.zerody.one/widget/gifts?cid=2833538"></iframe>
  </div>

  <div id="viewersBox">
    <iframe src="https://tikfinity.zerody.one/widget/viewercount?cid=2833538"></iframe>
  </div>

</div>

<div id="chatContainer">
  <iframe 
    id="chatFrame"
    src="https://tikfinity.zerody.one/widget/chat?cid=2833538">
  </iframe>
</div>

</body>
</html>
